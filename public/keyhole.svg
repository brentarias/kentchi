<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#3a1a5c"/>
      <stop offset="100%" stop-color="#190D2B"/>
    </radialGradient>
    <linearGradient id="gold" gradientUnits="userSpaceOnUse" x1="50" y1="18" x2="50" y2="80">
      <stop offset="0%" stop-color="#FFE3A6"/>
      <stop offset="55%" stop-color="#E4B423"/>
      <stop offset="100%" stop-color="#C8922E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD782" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFD782" stop-opacity="0"/>
    </radialGradient>
    <!-- ===== GOLD RING geometry lives here ===== -->
    <!-- The ring is the band between these two circles.                 -->
    <!--   OUTER edge: r="48"  -> leave this alone (your "just right").   -->
    <!--   INNER edge: r="45"  -> THIS IS THE KNOB. Adjust ring thickness -->
    <!--                          by changing ONLY this number:           -->
    <!--                            smaller r  = THICKER ring             -->
    <!--                            larger  r  = THINNER ring             -->
    <!--                          (current 45 gives a 3-unit-thick ring)  -->
    <mask id="ring">
      <circle cx="50" cy="50" r="48" fill="#fff"/>
      <circle cx="50" cy="50" r="42" fill="#000"/>
    </mask>
  </defs>

  <!-- Navy field -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Embellishments: soft glow + radiant rays + faint stars.
       All fade to nothing at favicon sizes; visible at large sizes. -->
  <circle cx="50.0" cy="38.0" r="30" fill="url(#glow)"/>
  <g stroke="#FFD782" stroke-width="0.7" stroke-opacity="0.22" stroke-linecap="round">
    <line x1="73.00" y1="38.00" x2="90.00" y2="38.00"/>
    <line x1="71.87" y1="45.11" x2="88.04" y2="50.36"/>
    <line x1="68.61" y1="51.52" x2="82.36" y2="61.51"/>
    <line x1="63.52" y1="56.61" x2="73.51" y2="70.36"/>
    <line x1="57.11" y1="59.87" x2="62.36" y2="76.04"/>
    <line x1="50.00" y1="61.00" x2="50.00" y2="78.00"/>
    <line x1="42.89" y1="59.87" x2="37.64" y2="76.04"/>
    <line x1="36.48" y1="56.61" x2="26.49" y2="70.36"/>
    <line x1="31.39" y1="51.52" x2="17.64" y2="61.51"/>
    <line x1="28.13" y1="45.11" x2="11.96" y2="50.36"/>
    <line x1="27.00" y1="38.00" x2="10.00" y2="38.00"/>
    <line x1="28.13" y1="30.89" x2="11.96" y2="25.64"/>
    <line x1="31.39" y1="24.48" x2="17.64" y2="14.49"/>
    <line x1="36.48" y1="19.39" x2="26.49" y2="5.64"/>
    <line x1="42.89" y1="16.13" x2="37.64" y2="-0.04"/>
    <line x1="50.00" y1="15.00" x2="50.00" y2="-2.00"/>
    <line x1="57.11" y1="16.13" x2="62.36" y2="-0.04"/>
    <line x1="63.52" y1="19.39" x2="73.51" y2="5.64"/>
    <line x1="68.61" y1="24.48" x2="82.36" y2="14.49"/>
    <line x1="71.87" y1="30.89" x2="88.04" y2="25.64"/>
  </g>
  <g fill="#F5E7C8" fill-opacity="0.55">
    <circle cx="22" cy="24" r="1.1"/>
    <circle cx="78" cy="24" r="1.1"/>
    <circle cx="15" cy="49" r="0.9"/>
    <circle cx="85" cy="49" r="0.9"/>
    <circle cx="30" cy="14" r="0.8"/>
    <circle cx="70" cy="14" r="0.8"/>
    <circle cx="50" cy="9" r="1.0"/>
  </g>

  <!-- Keyhole: round top + flared stem, vertical gold gradient -->
  <path d="M 41.50 53.00 L 24.00 80.00 L 76.00 80.00 L 58.50 53.00 A 20.00 20.00 0 1 0 41.50 53.00 Z" fill="url(#gold)"/>

  <!-- Simplified single gold ring.
       Edges are defined by the "ring" mask in <defs> above — adjust the
       INNER radius there. This element just paints gold into that band. -->
  <circle cx="50" cy="50" r="50" fill="#E4B423" mask="url(#ring)"/>
</svg>
